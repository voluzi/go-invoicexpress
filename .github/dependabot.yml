version: 2
updates:
  # Keep GitHub Actions pinned versions current (checkout, setup-go, golangci-lint).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Go modules. This library has no third-party dependencies today, but this
  # keeps the toolchain/transitive surface monitored if that ever changes.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
